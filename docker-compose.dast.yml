services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
      POSTGRES_USER: ${POSTGRES_USER:-clinic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_pass}
    volumes:
      - pgdata_dast:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic_user} -d ${POSTGRES_DB:-clinic_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-clinic_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-clinic_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-clinic_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
    ports:
      - "${DAST_BACKEND_PORT:-18080}:8080"

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: root
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8080}
    ports:
      - "${DAST_FRONTEND_PORT:-15173}:5173"

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    profiles: ["scanner"]
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    working_dir: /zap/wrk
    volumes:
      - ./dast/zap-config:/zap/wrk:ro
      - ./dast/reports:/zap/reports:rw
    entrypoint: []
    command:
      - zap.sh
      - -cmd
      - -addonupdate
      - -addoninstall
      - pscanrulesBeta
      - -addoninstall
      - ascanrulesBeta
      - -autorun
      - /zap/wrk/automation-plan.yaml
      - -config
      - api.disablekey=true
    user: root

volumes:
  pgdata_dast:
