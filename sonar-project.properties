# SonarQube Project Configuration
# Required: Configure SONAR_HOST_URL and SONAR_TOKEN in GitHub repository secrets

# Project identification
sonar.projectKey=clinic-management-app
sonar.projectName=Clinic Management Application
sonar.projectVersion=1.0

# Source code locations
sonar.sources=src/backend/src/main,src/frontend/src
sonar.tests=src/backend/src/test

# Language-specific settings
sonar.java.source=21
sonar.java.binaries=src/backend/target/classes
sonar.java.libraries=src/backend/target/dependency/*.jar

# JavaScript/TypeScript settings
sonar.javascript.node.maxspace=4096

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Test coverage (if you add coverage in the future)
# sonar.java.coveragePlugin=jacoco
# sonar.coverage.jacoco.xmlReportPaths=src/backend/target/site/jacoco/jacoco.xml
# sonar.javascript.lcov.reportPaths=src/frontend/coverage/lcov.info

# Issue settings
# The GitHub Actions workflow checks the quality gate explicitly in a separate step.
# Avoid blocking the scanner itself so failures are reported in one place.
# sonar.qualitygate.wait=true

# Additional analysis parameters
sonar.sourceEncoding=UTF-8
