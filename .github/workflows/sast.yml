name: SAST - PR Checks

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:  

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve git range
        id: range
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "log_opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "log_opts=--all" >> "$GITHUB_OUTPUT"
          else
            echo "log_opts=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p reports
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git . \
            --config=.gitleaks.toml \
            --log-opts="${{ steps.range.outputs.log_opts }}" \
            --report-format sarif \
            --report-path reports/gitleaks-pr.sarif \
            --redact \
            --exit-code 1

      - name: Upload Gitleaks report
        if: always() && hashFiles('reports/gitleaks-pr.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-pr-report
          path: reports/gitleaks-pr.sarif

      - name: Show Gitleaks findings
        if: steps.gitleaks.outcome == 'failure'
        shell: bash
        run: |
          mkdir -p reports
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git . \
            --config=.gitleaks.toml \
            --log-opts="${{ steps.range.outputs.log_opts }}" \
            --report-format json \
            --report-path reports/gitleaks-pr.json \
            --redact \
            --exit-code 0

          echo "Gitleaks findings:"
          jq -r '
            .[]
            | "- rule=\(.RuleID // "unknown"), file=\(.File // "unknown"), line=\(.StartLine // 0), commit=\(.Commit // "unknown")"
          ' reports/gitleaks-pr.json

      - name: Enforce Gitleaks gate
        if: steps.gitleaks.outcome == 'failure'
        run: exit 1

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.145.0

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        env:
          SEMGREP_SEND_METRICS: "off"
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/security-audit \
            --config .semgrep.yml \
            --severity ERROR \
            --error \
            --disable-version-check \
            --metrics=off \
            --use-git-ignore \
            --sarif \
            --output reports/semgrep-pr.sarif

      - name: Upload Semgrep report
        if: always() && hashFiles('reports/semgrep-pr.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-pr-report
          path: reports/semgrep-pr.sarif

      - name: Enforce Semgrep gate
        if: steps.semgrep.outcome == 'failure'
        run: exit 1

  eslint-security:
    name: ESLint Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint with security rules
        id: eslint
        continue-on-error: true
        run: npm run lint

      - name: Enforce ESLint gate
        if: steps.eslint.outcome == 'failure'
        run: exit 1

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        id: trivy_fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln,misconfig'
          exit-code: 1

      - name: Upload Trivy filesystem report
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-results.sarif

      - name: Show Trivy filesystem findings
        if: steps.trivy_fs.outcome == 'failure'
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln,misconfig'
          exit-code: 0

      - name: Run Trivy backend dependency scan
        id: trivy_backend
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'src/backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln'
          exit-code: 1

      - name: Upload Trivy backend dependency report
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-report
          path: trivy-backend-results.sarif

      - name: Show Trivy backend findings
        if: steps.trivy_backend.outcome == 'failure'
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'src/backend'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          scanners: 'vuln'
          exit-code: 0

      - name: Enforce Trivy gate
        if: steps.trivy_fs.outcome == 'failure' || steps.trivy_backend.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "### Trivy gate failed"
            echo ""
            echo "- Filesystem scan outcome: \`${{ steps.trivy_fs.outcome }}\`"
            echo "- Backend dependency scan outcome: \`${{ steps.trivy_backend.outcome }}\`"
            echo "- Review the Trivy scan step logs and uploaded SARIF artifacts for the blocking findings."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    services:
      sonarqube:
        image: sonarqube:10-community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
        options: >-
          --health-cmd "curl -f http://localhost:9000/api/system/status || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5
          --health-start-period 120s
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones disabled for better analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "20"

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to be ready..."
          sleep 30
          for i in {1..60}; do
            if curl -sf http://localhost:9000/api/system/status | grep -q "UP"; then
              echo "SonarQube is UP after $((i*5)) seconds!"
              break
            fi
            echo "Attempt $i: SonarQube not ready yet, waiting..."
            sleep 5
          done
          curl -s http://localhost:9000/api/system/status || echo "Final check failed"
          echo "SonarQube initialization complete!"

      - name: Configure SonarQube project
        run: |
          set -euo pipefail

          # Wait a bit more for full initialization
          sleep 20

          project_key="clinic-management-app"
          quality_gate_name="Clinic Management PR Gate"
          sonar_admin_user="admin"
          sonar_admin_password="admin"
          sonar_auth="${sonar_admin_user}:${sonar_admin_password}"

          # Create project using default admin credentials
          curl -u "${sonar_auth}" -X POST \
            "http://localhost:9000/api/projects/create?project=${project_key}&name=Clinic+Management+Application" \
            || echo "Project may already exist, continuing..."

          # Delete existing quality gate if it exists to ensure clean state
          curl -sf -u "${sonar_auth}" -X POST \
            --data-urlencode "name=${quality_gate_name}" \
            "http://localhost:9000/api/qualitygates/destroy" \
            || echo "Quality gate did not exist or could not be deleted, continuing..."

          # Create a fresh custom quality gate for the ephemeral PR instance.
          # Coverage and violations conditions are intentionally excluded because this project
          # does not have tests. Security hotspots review is included to ensure manual review
          # of security-sensitive code.
          curl -sf -u "${sonar_auth}" -X POST \
            --data-urlencode "name=${quality_gate_name}" \
            "http://localhost:9000/api/qualitygates/create"

          create_quality_gate_condition() {
            local metric="$1"
            local op="$2"
            local error="$3"

            curl -sf -u "${sonar_auth}" -X POST \
              --data-urlencode "gateName=${quality_gate_name}" \
              --data-urlencode "metric=${metric}" \
              --data-urlencode "op=${op}" \
              --data-urlencode "error=${error}" \
              "http://localhost:9000/api/qualitygates/create_condition"
          }

          # Only add conditions for code quality metrics (no coverage or violations)
          create_quality_gate_condition "new_reliability_rating" "GT" "1"
          create_quality_gate_condition "new_security_rating" "GT" "1"
          create_quality_gate_condition "new_security_hotspots_reviewed" "LT" "100"
          create_quality_gate_condition "new_maintainability_rating" "GT" "1"
          create_quality_gate_condition "new_duplicated_lines_density" "GT" "3"

          curl -sf -u "${sonar_auth}" -X POST \
            --data-urlencode "projectKey=${project_key}" \
            --data-urlencode "gateName=${quality_gate_name}" \
            "http://localhost:9000/api/qualitygates/select"

          # Generate token for analysis
          TOKEN_RESPONSE=$(curl -u "${sonar_auth}" -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=github-actions-${{ github.run_id }}")

          # Extract token from JSON response
          TOKEN=$(echo $TOKEN_RESPONSE | grep -o '"token":"[^"]*' | cut -d'"' -f4)

          if [ -z "$TOKEN" ]; then
            echo "Failed to generate token"
            exit 1
          fi

          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "SONAR_HOST_URL=http://localhost:9000" >> $GITHUB_ENV

      - name: Build backend for SonarQube
        working-directory: src/backend
        run: ./mvnw -B -DskipTests clean compile dependency:copy-dependencies -DincludeScope=compile -DoutputDirectory=target/dependency

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run SonarQube scan
        id: sonarqube
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Check SonarQube Quality Gate
        id: sonarqube_gate
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Build SonarQube PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_SCAN_OUTCOME: ${{ steps.sonarqube.outcome }}
          SONAR_GATE_OUTCOME: ${{ steps.sonarqube_gate.outcome }}
        shell: bash
        run: |
          set -euo pipefail

          comment_file="$RUNNER_TEMP/sonarqube-pr-comment.md"
          marker="<!-- sonarqube-pr-comment -->"
          qg_file="$RUNNER_TEMP/sonarqube-quality-gate.json"
          metrics_file="$RUNNER_TEMP/sonarqube-metrics.json"

          metric_value() {
            local metric="$1"
            local default_value="$2"
            jq -r --arg metric "$metric" --arg default_value "$default_value" '
              first(.component.measures[]? | select(.metric == $metric) | (.period.value // .value))
              // $default_value
            ' "$metrics_file" 2>/dev/null || echo "$default_value"
          }

          format_percent() {
            local value="$1"
            if [ "$value" = "N/A" ]; then
              echo "N/A"
            else
              echo "${value}%"
            fi
          }

          quality_status="UNKNOWN"

          # Fetch quality gate status
          if [ "$SONAR_SCAN_OUTCOME" = "success" ]; then
            curl -sf -u "${SONAR_TOKEN}:" \
              "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=clinic-management-app" \
              > "$qg_file" || true

            if [ -s "$qg_file" ]; then
              quality_status=$(jq -r '.projectStatus.status // "UNKNOWN"' "$qg_file")
            fi

            # Fetch detailed metrics
            curl -sf -u "${SONAR_TOKEN}:" \
              "${SONAR_HOST_URL}/api/measures/component?component=clinic-management-app&metricKeys=bugs,vulnerabilities,code_smells,security_hotspots,coverage,duplicated_lines_density,ncloc,new_bugs,new_vulnerabilities,new_code_smells,new_security_hotspots,new_coverage,new_duplicated_lines_density,new_lines" \
              > "$metrics_file" || true
          fi

          # Build the comment
          {
            echo "$marker"
            echo "## SonarQube Analysis Report"
            echo ""

            # Status indicator
            if [ "$quality_status" = "OK" ]; then
              echo "### Quality Gate: **Passed**"
            elif [ "$quality_status" = "ERROR" ]; then
              echo "### Quality Gate: **Failed**"
            else
              echo "### Quality Gate: **$quality_status**"
            fi
            echo ""

            # Scan status
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Scan execution | \`$SONAR_SCAN_OUTCOME\` |"
            echo "| Quality gate check | \`$SONAR_GATE_OUTCOME\` |"
            echo ""

            # Metrics section
            if [ -s "$metrics_file" ]; then
              echo "### Code Metrics"
              echo ""
              echo "#### New Code (This PR)"
              echo "| Metric | Value |"
              echo "| --- | --- |"

              new_bugs=$(metric_value "new_bugs" "0")
              new_vulnerabilities=$(metric_value "new_vulnerabilities" "0")
              new_code_smells=$(metric_value "new_code_smells" "0")
              new_hotspots=$(metric_value "new_security_hotspots" "0")
              new_coverage=$(metric_value "new_coverage" "N/A")
              new_duplications=$(metric_value "new_duplicated_lines_density" "0.0")
              new_lines=$(metric_value "new_lines" "0")

              echo "| Bugs | **$new_bugs** |"
              echo "| Vulnerabilities | **$new_vulnerabilities** |"
              echo "| Code Smells | **$new_code_smells** |"
              echo "| Security Hotspots | **$new_hotspots** |"
              echo "| Coverage | **$(format_percent "$new_coverage")** |"
              echo "| Duplications | **$(format_percent "$new_duplications")** |"
              echo "| Lines of Code | **$new_lines** |"
              echo ""

              echo "#### Overall Project"
              echo "| Metric | Value |"
              echo "| --- | --- |"

              total_bugs=$(metric_value "bugs" "0")
              total_vulnerabilities=$(metric_value "vulnerabilities" "0")
              total_code_smells=$(metric_value "code_smells" "0")
              total_hotspots=$(metric_value "security_hotspots" "0")
              total_coverage=$(metric_value "coverage" "N/A")
              total_duplications=$(metric_value "duplicated_lines_density" "0.0")
              total_ncloc=$(metric_value "ncloc" "0")

              echo "| Bugs | $total_bugs |"
              echo "| Vulnerabilities | $total_vulnerabilities |"
              echo "| Code Smells | $total_code_smells |"
              echo "| Security Hotspots | $total_hotspots |"
              echo "| Coverage | $(format_percent "$total_coverage") |"
              echo "| Duplications | $(format_percent "$total_duplications") |"
              echo "| Lines of Code | $total_ncloc |"
              echo ""
            fi

            # Quality gate conditions
            if [ -s "$qg_file" ]; then
              echo "### Quality Gate Requirements"
              echo ""

              # Check if there are evaluated conditions
              has_conditions=$(jq -r '.projectStatus.conditions // [] | length' "$qg_file")

              if [ "$has_conditions" -gt 0 ]; then
                # Show evaluated conditions with user-friendly descriptions
                python3 - <<'PY' >> "$comment_file"
                import json
                import os
                from pathlib import Path

                qg_file = Path(os.environ["RUNNER_TEMP"] + "/sonarqube-quality-gate.json")
                qg_data = json.loads(qg_file.read_text())
                conditions = qg_data.get("projectStatus", {}).get("conditions", [])

                metric_descriptions = {
                    "new_reliability_rating": ("No bugs in new code", "Bugs found"),
                    "new_security_rating": ("No vulnerabilities in new code", "Vulnerabilities found"),
                    "new_security_hotspots_reviewed": ("All security hotspots reviewed", "Security hotspots need review"),
                    "new_maintainability_rating": ("No code smells in new code", "Code smells found"),
                    "new_duplicated_lines_density": ("Less than 3% code duplication", "Too much duplicated code"),
                }

                for condition in conditions:
                    metric = condition.get("metricKey", "unknown")
                    status = condition.get("status", "UNKNOWN")
                    actual = condition.get("actualValue", "-")

                    if metric in metric_descriptions:
                        pass_desc, fail_desc = metric_descriptions[metric]
                        if status == "OK":
                            print(f"- {pass_desc}")
                        else:
                            print(f"- **FAILED**: {fail_desc}")
                            if metric == "new_duplicated_lines_density":
                                print(f"  - Duplication: {actual}%")
                            elif "rating" in metric:
                                rating_map = {"1": "A (0 issues)", "2": "B (minor)", "3": "C (major)", "4": "D (critical)", "5": "E (blocker)"}
                                print(f"  - Rating: {rating_map.get(actual, actual)}")
                            elif metric == "new_security_hotspots_reviewed":
                                print(f"  - Reviewed: {actual}%")
                    else:
                        # Fallback for unknown metrics
                        status_text = "Passed" if status == "OK" else "**FAILED**"
                        print(f"- {metric}: {status_text}")
                PY
              else
                # No evaluated conditions - show what will be checked
                echo "Your PR will be checked for:"
                echo ""
                echo "- No bugs in new code"
                echo "- No vulnerabilities in new code"
                echo "- All security hotspots reviewed"
                echo "- No code smells in new code"
                echo "- Less than 3% code duplication"
                echo ""
                echo "_These conditions will be evaluated when you add new code to this PR._"
              fi
              echo ""
            fi
          } > "$comment_file"


      - name: Comment SonarQube report on PR
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(`${process.env.RUNNER_TEMP}/sonarqube-pr-comment.md`, 'utf8');
            const marker = '<!-- sonarqube-pr-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce SonarQube gate
        if: steps.sonarqube.outcome == 'failure' || steps.sonarqube_gate.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "### SonarQube gate failed"
            echo ""
            echo "- Scan step outcome: \`${{ steps.sonarqube.outcome }}\`"
            echo "- Quality gate step outcome: \`${{ steps.sonarqube_gate.outcome }}\`"
            echo "- Check the SonarQube scan and quality gate step logs for the specific failure."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

  sast-summary:
    name: SAST Security Summary
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [gitleaks, semgrep, eslint-security, trivy]
    permissions:
      pull-requests: write
    steps:
      - name: Download Gitleaks report
        if: needs.gitleaks.result == 'failure'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-pr-report
          path: reports/

      - name: Download Semgrep report
        if: needs.semgrep.result == 'failure'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: semgrep-pr-report
          path: reports/

      - name: Download Trivy reports
        if: needs.trivy.result == 'failure'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-*-report
          path: reports/
          merge-multiple: true

      - name: Build SAST security summary
        id: build_summary
        shell: bash
        run: |
          summary_file="$RUNNER_TEMP/sast-security-summary.md"
          marker="<!-- sast-security-summary -->"

          # Job results
          gitleaks_result="${{ needs.gitleaks.result }}"
          semgrep_result="${{ needs.semgrep.result }}"
          eslint_result="${{ needs.eslint-security.result }}"
          trivy_result="${{ needs.trivy.result }}"

          # Status formatting
          format_status() {
            case "$1" in
              success) echo "Passed" ;;
              failure) echo "**Failed**" ;;
              skipped) echo "Skipped" ;;
              cancelled) echo "Cancelled" ;;
              *) echo "Unknown" ;;
            esac
          }

          # Build comment
          {
            echo "$marker"
            echo "## SAST Security Summary"
            echo ""
            echo "| Tool | Status |"
            echo "| --- | --- |"
            echo "| Gitleaks | $(format_status "$gitleaks_result") |"
            echo "| Semgrep | $(format_status "$semgrep_result") |"
            echo "| ESLint Security | $(format_status "$eslint_result") |"
            echo "| Trivy | $(format_status "$trivy_result") |"
            echo ""
          } > "$summary_file"

          # Add Gitleaks findings if failed
          if [ "$gitleaks_result" = "failure" ] && [ -f "reports/gitleaks-pr.sarif" ]; then
            echo "### Gitleaks Findings" >> "$summary_file"
            echo "" >> "$summary_file"

            findings_count=$(jq '[.runs[].results[]] | length' reports/gitleaks-pr.sarif 2>/dev/null || echo "0")

            if [ "$findings_count" -gt 0 ]; then
              echo "Found **${findings_count}** secret(s):" >> "$summary_file"
              echo "" >> "$summary_file"
              jq -r '
                .runs[].results[]
                | "- **\(.ruleId // "unknown")** in `\(.locations[0].physicalLocation.artifactLocation.uri // "unknown"):\(.locations[0].physicalLocation.region.startLine // 0)`"
              ' reports/gitleaks-pr.sarif 2>/dev/null | head -20 >> "$summary_file"

              if [ "$findings_count" -gt 20 ]; then
                echo "" >> "$summary_file"
                echo "_Showing first 20 findings. See artifacts for complete report._" >> "$summary_file"
              fi
            else
              echo "No findings details available." >> "$summary_file"
            fi
            echo "" >> "$summary_file"
          fi

          # Add Semgrep findings if failed
          if [ "$semgrep_result" = "failure" ] && [ -f "reports/semgrep-pr.sarif" ]; then
            echo "### Semgrep Findings" >> "$summary_file"
            echo "" >> "$summary_file"

            findings_count=$(jq '[.runs[].results[]] | length' reports/semgrep-pr.sarif 2>/dev/null || echo "0")

            if [ "$findings_count" -gt 0 ]; then
              echo "Found **${findings_count}** issue(s):" >> "$summary_file"
              echo "" >> "$summary_file"
              jq -r '
                .runs[].results[]
                | "- **\(.ruleId // "unknown")**: \(.message.text // "no description") in `\(.locations[0].physicalLocation.artifactLocation.uri // "unknown"):\(.locations[0].physicalLocation.region.startLine // 0)`"
              ' reports/semgrep-pr.sarif 2>/dev/null | head -20 >> "$summary_file"

              if [ "$findings_count" -gt 20 ]; then
                echo "" >> "$summary_file"
                echo "_Showing first 20 findings. See artifacts for complete report._" >> "$summary_file"
              fi
            else
              echo "No findings details available." >> "$summary_file"
            fi
            echo "" >> "$summary_file"
          fi

          # Add Trivy findings if failed
          if [ "$trivy_result" = "failure" ]; then
            echo "### Trivy Findings" >> "$summary_file"
            echo "" >> "$summary_file"

            total_vulns=0
            if [ -f "reports/trivy-fs-results.sarif" ]; then
              fs_count=$(jq '[.runs[].results[]] | length' reports/trivy-fs-results.sarif 2>/dev/null || echo "0")
              total_vulns=$((total_vulns + fs_count))
            fi
            if [ -f "reports/trivy-backend-results.sarif" ]; then
              backend_count=$(jq '[.runs[].results[]] | length' reports/trivy-backend-results.sarif 2>/dev/null || echo "0")
              total_vulns=$((total_vulns + backend_count))
            fi

            if [ "$total_vulns" -gt 0 ]; then
              echo "Found **${total_vulns}** vulnerability/vulnerabilities:" >> "$summary_file"
              echo "" >> "$summary_file"

              # Parse filesystem findings
              if [ -f "reports/trivy-fs-results.sarif" ]; then
                jq -r '
                  .runs[].results[]
                  | "- **\(.ruleId // "unknown")**: \(.message.text // "no description") (\(.level // "unknown"))"
                ' reports/trivy-fs-results.sarif 2>/dev/null | head -10 >> "$summary_file"
              fi

              # Parse backend dependency findings
              if [ -f "reports/trivy-backend-results.sarif" ]; then
                jq -r '
                  .runs[].results[]
                  | "- **\(.ruleId // "unknown")**: \(.message.text // "no description") (\(.level // "unknown"))"
                ' reports/trivy-backend-results.sarif 2>/dev/null | head -10 >> "$summary_file"
              fi

              if [ "$total_vulns" -gt 20 ]; then
                echo "" >> "$summary_file"
                echo "_Showing first 20 findings. See artifacts for complete report._" >> "$summary_file"
              fi
            else
              echo "Trivy scan failed but no findings details available." >> "$summary_file"
            fi
            echo "" >> "$summary_file"
          fi

          # Add footer
          {
            echo "---"
            echo ""
            echo "_This summary is automatically updated on each commit._"
          } >> "$summary_file"

      - name: Post SAST security summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(`${process.env.RUNNER_TEMP}/sast-security-summary.md`, 'utf8');
            const marker = '<!-- sast-security-summary -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
