name: SAST Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend for CodeQL
        if: matrix.language == 'java-kotlin'
        working-directory: src/backend
        run: ./mvnw -B -DskipTests compile

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  frontend-deps:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p ../reports
          npm audit --omit=dev --audit-level=high --json > ../reports/frontend-audit-nightly.json

      - name: Upload npm audit nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-nightly-report
          path: src/reports/frontend-audit-nightly.json
          if-no-files-found: warn

      - name: Enforce npm audit nightly gate
        if: steps.npm_audit.outcome == 'failure'
        run: exit 1

  semgrep-comprehensive:
    name: Semgrep (Comprehensive)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.145.0

      - name: Run comprehensive Semgrep scan
        id: semgrep
        continue-on-error: true
        env:
          SEMGREP_SEND_METRICS: "off"
        run: |
          mkdir -p reports
          python -m semgrep scan \
            --config p/owasp-top-ten \
            --config p/java \
            --config p/javascript \
            --config p/security-audit \
            --config .semgrep.yml \
            --severity ERROR \
            --severity WARNING \
            --error \
            --disable-version-check \
            --metrics=off \
            --use-git-ignore \
            --sarif \
            --output reports/semgrep-nightly.sarif

      - name: Upload Semgrep nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-nightly-report
          path: reports/semgrep-nightly.sarif
          if-no-files-found: warn

      - name: Enforce Semgrep nightly gate
        if: steps.semgrep.outcome == 'failure'
        run: exit 1

  trivy-comprehensive:
    name: Trivy Comprehensive Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy comprehensive filesystem scan
        id: trivy_fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-nightly.sarif'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          scanners: 'vuln,secret,misconfig'
          exit-code: 0

      - name: Upload Trivy filesystem nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-nightly-report
          path: trivy-fs-nightly.sarif
          if-no-files-found: warn

      - name: Run Trivy backend dependency scan
        id: trivy_backend
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: 'fs'
          scan-ref: 'src/backend'
          format: 'sarif'
          output: 'trivy-backend-nightly.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          scanners: 'vuln'
          exit-code: 1

      - name: Upload Trivy backend nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-nightly-report
          path: trivy-backend-nightly.sarif
          if-no-files-found: warn

      - name: Enforce Trivy nightly gate
        if: steps.trivy_backend.outcome == 'failure'
        run: exit 1

  backend-deep:
    name: Backend Deep Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend deep scan (SpotBugs + OWASP Dependency-Check)
        id: backend_scan
        continue-on-error: true
        run: |
          ./mvnw -B -Psecurity-sast -DskipTests verify

      - name: Upload backend nightly reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-nightly-security-reports
          path: |
            src/backend/target/spotbugsXml.xml
            src/backend/target/dependency-check-report.html
            src/backend/target/dependency-check-report.json
            src/backend/target/dependency-check-report.xml
          if-no-files-found: warn

      - name: Enforce backend nightly gate
        if: steps.backend_scan.outcome == 'failure'
        run: exit 1
