name: SAST Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Build backend for CodeQL
        if: matrix.language == 'java-kotlin'
        working-directory: src/backend
        run: ./mvnw -B -DskipTests compile

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  semgrep-comprehensive:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep==1.145.0

      - name: Run comprehensive Semgrep scan
        id: semgrep
        continue-on-error: true
        env:
          SEMGREP_SEND_METRICS: "off"
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/java \
            --config p/javascript \
            --config .semgrep.yml \
            --severity ERROR \
            --severity WARNING \
            --error \
            --disable-version-check \
            --metrics=off \
            --use-git-ignore \
            --sarif \
            --output reports/semgrep-nightly.sarif

      - name: Upload Semgrep nightly report
        if: always() && hashFiles('reports/semgrep-nightly.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-nightly-report
          path: reports/semgrep-nightly.sarif

      - name: Enforce Semgrep nightly gate
        if: steps.semgrep.outcome == 'failure'
        run: exit 1

  trivy-images:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_SUMMARY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          tags: clinic-backend:nightly
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          tags: clinic-frontend:nightly
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image with Trivy
        id: trivy_backend_image
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'image'
          image-ref: 'clinic-backend:nightly'
          format: 'sarif'
          output: 'trivy-backend-image.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: 1

      - name: Upload backend image scan report
        if: always() && hashFiles('trivy-backend-image.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-image-report
          path: trivy-backend-image.sarif

      - name: Generate backend findings JSON
        if: steps.trivy_backend_image.outcome == 'failure'
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'image'
          image-ref: 'clinic-backend:nightly'
          format: 'json'
          output: 'trivy-backend-findings.json'
          severity: 'HIGH,CRITICAL'
          exit-code: 0

      - name: Scan frontend image with Trivy
        id: trivy_frontend_image
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'image'
          image-ref: 'clinic-frontend:nightly'
          format: 'sarif'
          output: 'trivy-frontend-image.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: 1

      - name: Upload frontend image scan report
        if: always() && hashFiles('trivy-frontend-image.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-image-report
          path: trivy-frontend-image.sarif

      - name: Generate frontend findings JSON
        if: steps.trivy_frontend_image.outcome == 'failure'
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: 'image'
          image-ref: 'clinic-frontend:nightly'
          format: 'json'
          output: 'trivy-frontend-findings.json'
          severity: 'HIGH,CRITICAL'
          exit-code: 0

      - name: Build summary and enforce gate
        if: always()
        shell: bash
        run: |
          backend_status="passed"
          frontend_status="passed"
          has_failures=0

          if [ "${{ steps.trivy_backend_image.outcome }}" = "failure" ]; then
            backend_status="failed"
            has_failures=1
          fi

          if [ "${{ steps.trivy_frontend_image.outcome }}" = "failure" ]; then
            frontend_status="failed"
            has_failures=1
          fi

          {
            echo "## Trivy Image Scan Summary"
            echo ""
            echo "| Image | Status |"
            echo "| --- | --- |"
            echo "| Backend | **${backend_status}** |"
            echo "| Frontend | **${frontend_status}** |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Add backend vulnerabilities table if it failed
          if [ -f "trivy-backend-findings.json" ] && [ "$backend_status" = "failed" ]; then
            python3 .github/scripts/render_trivy_summary.py \
              "Backend Image Vulnerabilities" \
              trivy-backend-findings.json >> "$GITHUB_STEP_SUMMARY"
          fi

          # Add frontend vulnerabilities table if it failed
          if [ -f "trivy-frontend-findings.json" ] && [ "$frontend_status" = "failed" ]; then
            python3 .github/scripts/render_trivy_summary.py \
              "Frontend Image Vulnerabilities" \
              trivy-frontend-findings.json >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${has_failures}" -eq 1 ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "**Gate Status:** ❌ Failed"
              echo ""
              echo "Review the SARIF artifacts for complete findings."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            {
              echo ""
              echo "**Gate Status:** ✅ Passed"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
