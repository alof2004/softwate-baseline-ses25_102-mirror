name: SAST Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend for CodeQL
        if: matrix.language == 'java-kotlin'
        working-directory: src/backend
        run: ./mvnw -B -DskipTests compile

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  gitleaks-full:
    name: Gitleaks Full History
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks full-history scan
        id: gitleaks
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p reports
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git . \
            --config=.gitleaks.toml \
            --report-format sarif \
            --report-path reports/gitleaks-nightly.sarif \
            --redact \
            --exit-code 1

      - name: Upload Gitleaks nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-nightly-report
          path: reports/gitleaks-nightly.sarif
          if-no-files-found: warn

      - name: Enforce Gitleaks nightly gate
        if: steps.gitleaks.outcome == 'failure'
        run: exit 1

  frontend-deps:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p ../reports
          npm audit --omit=dev --audit-level=high --json > ../reports/frontend-audit-nightly.json

      - name: Upload npm audit nightly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-nightly-report
          path: src/reports/frontend-audit-nightly.json
          if-no-files-found: warn

      - name: Enforce npm audit nightly gate
        if: steps.npm_audit.outcome == 'failure'
        run: exit 1

  backend-deep:
    name: Backend Deep Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend deep scan
        id: backend_scan
        continue-on-error: true
        run: |
          ./mvnw -B -Psecurity-sast -DskipTests verify

      - name: Upload backend nightly reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-nightly-security-reports
          path: |
            src/backend/target/dependency-check-report.html
            src/backend/target/dependency-check-report.json
            src/backend/target/dependency-check-report.xml
            src/backend/target/spotbugsXml.xml
          if-no-files-found: warn

      - name: Enforce backend nightly gate
        if: steps.backend_scan.outcome == 'failure'
        run: exit 1
