name: DAST Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: dast-nightly
  cancel-in-progress: false

jobs:
  zap:
    name: OWASP ZAP
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make DAST scripts executable
        run: chmod +x dast/scripts/*.sh

      - name: Run nightly DAST scan
        env:
          COMPOSE_PROJECT_NAME: clinic-dast-nightly-${{ github.run_id }}
        run: ./dast/scripts/run-dast-scan.sh

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-nightly-reports
          path: |
            dast/reports/zap-report.html
            dast/reports/zap-report.json
            dast/reports/zap-report.sarif
          if-no-files-found: warn

      - name: Publish DAST findings
        if: always() && hashFiles('dast/reports/zap-report.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dast/reports/zap-report.sarif
          category: dast-zap-nightly

      - name: Summarize DAST findings
        if: always() && hashFiles('dast/reports/zap-report.json') != ''
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("dast/reports/zap-report.json")
          report = json.loads(report_path.read_text())
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          alerts = []
          for site in report.get("site", []):
              alerts.extend(site.get("alerts", []))

          counts = {"High": 0, "Medium": 0, "Low": 0, "Informational": 0}
          for alert in alerts:
              risk = alert.get("risk", "Informational")
              counts[risk] = counts.get(risk, 0) + 1

          top_alerts = []
          for alert in alerts:
              instances = len(alert.get("instances", []))
              top_alerts.append(
                  {
                      "name": alert.get("name", "Unknown"),
                      "risk": alert.get("risk", "Informational"),
                      "instances": instances,
                  }
              )

          top_alerts.sort(
              key=lambda item: (
                  {"High": 0, "Medium": 1, "Low": 2, "Informational": 3}.get(item["risk"], 4),
                  -item["instances"],
                  item["name"],
              )
          )

          lines = [
              "## DAST Scan Summary",
              "",
              "| Severity | Count |",
              "| --- | ---: |",
              f"| High | {counts.get('High', 0)} |",
              f"| Medium | {counts.get('Medium', 0)} |",
              f"| Low | {counts.get('Low', 0)} |",
              f"| Informational | {counts.get('Informational', 0)} |",
              f"| Total | {sum(counts.values())} |",
              "",
          ]

          if top_alerts:
              lines.extend(
                  [
                      "### Top Findings",
                      "",
                      "| Finding | Severity | Instances |",
                      "| --- | --- | ---: |",
                  ]
              )
              for alert in top_alerts[:10]:
                  lines.append(
                      f"| {alert['name']} | {alert['risk']} | {alert['instances']} |"
                  )
          else:
              lines.append("No findings were reported in the JSON summary.")

          summary_path.write_text("\n".join(lines) + "\n")
          PY
