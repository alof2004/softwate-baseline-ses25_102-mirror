repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args:
          - --config=.gitleaks.toml

  - repo: https://github.com/semgrep/pre-commit
    rev: v1.145.0
    hooks:
      - id: semgrep
        name: semgrep (security)
        args:
          - --config
          - p/owasp-top-ten
          - --config
          - p/java
          - --config
          - p/javascript
          - --config
          - .semgrep.yml
          - --severity
          - ERROR
          - --error
          - --disable-version-check
          - --metrics=off
          - --use-git-ignore
